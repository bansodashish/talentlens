server {
    listen 80;
    server_name talentlenses.leedscrownbridge.co.uk leedscrownbridge.co.uk;

    # Certbot can use this block for HTTP challenge and install certificates.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Force HTTPS + canonical host.
    return 301 https://talentlenses.leedscrownbridge.co.uk$request_uri;
}

server {
    listen 443 ssl http2;
    server_name talentlenses.leedscrownbridge.co.uk leedscrownbridge.co.uk;

    # These lines are managed by certbot on the VPS.
    ssl_certificate /etc/letsencrypt/live/talentlenses.leedscrownbridge.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/talentlenses.leedscrownbridge.co.uk/privkey.pem;

    # Max upload size (for CV uploads)
    client_max_body_size 20M;

    # Serve React build directly from nginx.
    root /var/www/talentlenses/talentlenses/client/build;
    index index.html;

    # API traffic goes to the Node backend.
    location /api/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri /index.html;
    }
}
